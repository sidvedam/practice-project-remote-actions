name: Workflow 1
on: push
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: 20
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Run linter
              run: eslint --ext .jsx src

    test:
        needs: lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: 20
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: vitest run

    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: 20
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: vite build
